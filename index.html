<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- all content goes here-->
        <header>
            <h1>Kanban Board</h1>
            <div class="badge"><span class="task-counter">0</span> Tasks</div>
            <div class="priority-header">
                <label for="priority">Filter</label>
                <select name="priority" id="priority-select" class="bg-low">
                    <option value="low" class="bg-low">Low</option>
                    <option value="medium" class="bg-medium">Medium</option>
                    <option value="high" class="bg-high">High</option>
                </select>
            </div>
        </header>
        <div class="grid">
            <section class="card" id="todo">
                <h2>To Do</h2>
                <div>
                    <ul>

                    </ul>
                </div>

                <button id="addTaskButton">+ Add Task</button>
            </section>

            <section class="card" id="inprogress"> 
                <h2>In Progress</h2>
                <div>
                    <ul>
                        
                    </ul>
                </div>

                <button id="addTaskButton">+ Add Task</button>
            </section> 

             <section class="card" id="done"> 
                <h2>Done</h2>
                <div>
                    <ul>
                        
                    </ul>
                </div>

                <button id="addTaskButton">+ Add Task</button>
            </section>
        </div>
        <footer> 
        </footer>
    </div>

    <div class="task-modal is-hidden">
        <div class="modal-content">
            <div class="task-title">
                <label for="task-title">Title</label>
                <input type="text" id="task-title">
            </div>
            <div class="task-description">
                <label for="task-description">Description</label>
                <textarea type="text" id="task-description"></textarea>
            </div>
            <div class="task-date">
                <label for="task-date">Due Date</label>
                <input type="date" id="task-date">
            </div>
            <div class="task-priority">
                <label for="priority-select">Priority</label>
                <select name="priority" id="priority-select">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <button id="saveButton">Save</button>
            <button id="cancelButton">Cancel</button>
        </div>
    </div>

    <script src="taskmanager.js"></script>

</body>
</html>
