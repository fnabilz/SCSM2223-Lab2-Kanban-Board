<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Kanban Board</h1>
            <div class="badge">
                <span class="task-counter">0</span> Tasks
            </div>
            <label for="priority">Filter</label>
            <select name="priority" id="priority-select">
                <option value="all">All</option>
                <option value="low" class="bg-low">Low</option>
                <option value="medium" class="bg-medium">Medium</option>
                <option value="high" class="bg-high">High</option>
            </select>
        </header>

        <div class="grid">
            <section class="card" id="todo">
                <h2>To Do</h2>
                <div>
                    <ul>

                    </ul>
                </div>

                <button id="addTaskButton">+ Add Task</button>
            </section>

            <section class="card" id="inprogress"> 
                <h2>In Progress</h2>
                <div>
                    <ul>
                        
                    </ul>
                </div>

                <button id="addTaskButton">+ Add Task</button>
            </section> 

             <section class="card" id="done"> 
                <h2>Done</h2>
                <div>
                    <ul>
                        
                    </ul>
                </div>

                <button id="addTaskButton">+ Add Task</button>
                <button id="clearButton">Clear All</button>
            </section>
        </div>
        <footer> 
        </footer>
    </div>

    <div class="task-modal is-hidden">
        <div class="modal-content">

            <div class="task-title">
                <label for="title-input">Title</label>
                <input type="text" id="title-input">
            </div>

            <div class="task-description">
                <label for="description-input">Description</label>
                <textarea type="text" id="description-input"></textarea>
            </div>

            <div class="task-date">
                <label for="date-input">Due Date</label>
                <input type="date" id="date-input">
            </div>

            <div class="card-priority">
                <label for="priority-input">Priority</label>
                <select name="priority" id="priority-input">
                    <option value="" disabled selected hidden></option>
                    <option value="low" class="bg-low">Low</option>
                    <option value="medium" class="bg-medium">Medium</option>
                    <option value="high" class="bg-high">High</option>
                </select>
            </div>
            
            <button id="saveButton">Save</button>
            <button id="cancelButton">Cancel</button>
        </div>
    </div>

    <script src="taskmanager.js"></script>

</body>
</html>
